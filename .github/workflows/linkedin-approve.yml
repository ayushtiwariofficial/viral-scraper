name: 💼 Approve & Post to LinkedIn

on:
  workflow_dispatch:
    inputs:
      content_id:
        description: 'Content queue ID (from ntfy notification or --list)'
        required: true
        type: string
      action:
        description: 'What to do with this post'
        required: true
        type: choice
        options: [approve, reject]

jobs:
  approve-and-post:
    name: Process LinkedIn approval
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      actions: write   # write needed to download artifact zip files via the API

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Create required directories
        run: |
          mkdir -p data logs config scrapers ai poster
          touch config/__init__.py data/__init__.py scrapers/__init__.py
          touch ai/__init__.py poster/__init__.py logs/scraper.log

      # Download latest DB via GitHub API — same script as scraper.yml
      - name: Restore database
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/download_db.py
          ls -lh data/

      - name: Verify post exists in database
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from data.database import init_db, get_content_by_id
          init_db()
          row = get_content_by_id(${{ inputs.content_id }})
          if not row:
              print('ERROR: Post #${{ inputs.content_id }} not found in database.')
              print('Run the main scraper workflow first, then check ntfy or --list for valid IDs.')
              sys.exit(1)
          row = dict(row)
          print(f'Post #{row[\"id\"]} | {row.get(\"original_source\",\"?\")} / {row.get(\"original_author\",\"?\")}')
          print(f'Approval: {row.get(\"approval_status\",\"?\")} | LinkedIn posted: {bool(row.get(\"posted_linkedin\"))}')
          if row.get('approval_status') == 'rejected':
              print('ERROR: This post was previously rejected.')
              sys.exit(1)
          if row.get('posted_linkedin'):
              print('ERROR: This post was already posted to LinkedIn.')
              sys.exit(1)
          print('✓ Post is valid and ready for approval')
          "

      - name: Restore LinkedIn session
        env:
          LINKEDIN_SESSION_B64: ${{ secrets.LINKEDIN_SESSION_B64 }}
        run: |
          python3 -c "
          import base64, os, sys, json
          raw = os.environ.get('LINKEDIN_SESSION_B64', '')
          if not raw:
              print('ERROR: LINKEDIN_SESSION_B64 not set.', file=sys.stderr)
              print('Run: python -m poster.linkedin_poster --login', file=sys.stderr)
              sys.exit(1)
          try:
              decoded = base64.b64decode(raw, validate=False)
              parsed  = json.loads(decoded)
          except Exception as e:
              print(f'ERROR: Bad session data: {e}', file=sys.stderr)
              print('Re-run: python -m poster.linkedin_poster --login', file=sys.stderr)
              sys.exit(1)
          os.makedirs('data', exist_ok=True)
          with open('data/linkedin_session.json', 'wb') as f:
              f.write(decoded)
          print(f'✓ Session restored ({len(parsed.get(\"cookies\",[]))} cookies)')
          "

      - name: Process approval
        run: |
          if [ "${{ inputs.action }}" = "approve" ]; then
            python -m poster.linkedin_poster --approve "${{ inputs.content_id }}"
          else
            python -m poster.linkedin_poster --reject "${{ inputs.content_id }}"
          fi

      # Save updated DB so the posted/rejected status persists
      - name: Save updated database artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: viral-scraper-db
          path: data/posts.db
          overwrite: true
          if-no-files-found: ignore
          retention-days: 90

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-approval-${{ github.run_number }}
          path: logs/scraper.log
          if-no-files-found: ignore
          retention-days: 7
