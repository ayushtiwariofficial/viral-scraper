# ============================================================
#  .github/workflows/linkedin-approve.yml
#
#  Manually-triggered workflow to approve and post a specific
#  piece of content to LinkedIn. This is the ONLY path that
#  posts to LinkedIn — there is no scheduled/automatic posting.
#
#  Usage:
#    1. Check your notifications (ntfy) or run
#       `python run_scraper.py --stats` to find a content ID
#    2. Go to Actions tab -> "Approve & Post to LinkedIn" -> Run workflow
#    3. Enter the content ID and action (approve/reject)
# ============================================================

name: 💼 Approve & Post to LinkedIn

on:
  workflow_dispatch:
    inputs:
      content_id:
        description: 'Content queue ID to approve/reject (from notification or --stats)'
        required: true
        type: string
      action:
        description: 'What to do with this content'
        required: true
        type: choice
        options:
          - approve
          - reject

jobs:
  approve-and-post:
    name: Process LinkedIn approval
    runs-on: ubuntu-latest
    timeout-minutes: 8   # posting itself takes well under a minute, but
                          # installing chromium + its system deps can take
                          # 2-4 minutes on a fresh runner — this accounts
                          # for setup time, not just the posting action

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # Use 'python -m playwright' instead of bare 'playwright' — the bare
          # command relies on the package's CLI script being on PATH, which
          # isn't always true right after pip install in the same shell step
          # on GitHub's hosted runners. 'python -m' always works since it just
          # asks the same Python interpreter we just installed the package
          # into to run it as a module.
          python -m playwright install --with-deps chromium

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/posts.db
          key: posts-db-${{ github.ref_name }}
          restore-keys: posts-db-

      - name: Restore LinkedIn session
        env:
          LINKEDIN_SESSION_B64: ${{ secrets.LINKEDIN_SESSION_B64 }}
        run: |
          mkdir -p data
          if [ -z "$LINKEDIN_SESSION_B64" ]; then
            echo "::error::LINKEDIN_SESSION_B64 secret is not set. Run 'python -m poster.linkedin_poster --login' "
            echo "::error::locally first, then base64-encode data/linkedin_session.json and save it as a secret."
            exit 1
          fi

          # Use Python for base64 decoding instead of the shell 'base64 -d' command.
          # Python's base64.b64decode(validate=False) strips whitespace/newlines
          # automatically, making it robust regardless of how the secret was encoded
          # (Mac 'base64 -i file | tr -d newlines', Windows PowerShell
          # [Convert]::ToBase64String(), or any other method).
          # The shell 'base64 -d' on Linux is strict and rejects embedded newlines,
          # which is the most common cause of 'base64: invalid input' errors.
          python3 -c "
          import base64, os, sys

          raw = os.environ.get('LINKEDIN_SESSION_B64', '')
          if not raw:
              print('ERROR: LINKEDIN_SESSION_B64 is empty', file=sys.stderr)
              sys.exit(1)

          try:
              # ignore_garbage=True strips whitespace, newlines, and other
              # non-base64 characters that commonly get embedded when copying
              # from a terminal or saving via different OS tools
              decoded = base64.b64decode(raw, validate=False)
          except Exception as e:
              print(f'ERROR: Could not decode base64 session: {e}', file=sys.stderr)
              sys.exit(1)

          # Quick sanity check — the decoded content should be valid JSON
          import json
          try:
              parsed = json.loads(decoded)
              if 'cookies' not in parsed:
                  print('WARNING: Decoded session has no cookies — session may be empty')
          except json.JSONDecodeError as e:
              print(f'ERROR: Decoded base64 is not valid JSON: {e}', file=sys.stderr)
              print('This usually means the session file was not fully written before encoding.')
              print('Re-run: python -m poster.linkedin_poster --login')
              sys.exit(1)

          os.makedirs('data', exist_ok=True)
          with open('data/linkedin_session.json', 'wb') as f:
              f.write(decoded)

          print(f'Session restored ({len(parsed.get(\"cookies\", []))} cookies)')
          "

      - name: Process approval
        run: |
          if [ "${{ inputs.action }}" = "approve" ]; then
            python -m poster.linkedin_poster --approve "${{ inputs.content_id }}"
          else
            python -m poster.linkedin_poster --reject "${{ inputs.content_id }}"
          fi

      - name: Save database to cache
        if: always()
        uses: actions/cache@v4
        with:
          path: data/posts.db
          key: posts-db-${{ github.ref_name }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-approval-${{ github.run_number }}
          path: logs/scraper.log
          if-no-files-found: ignore
          retention-days: 7
