name: 💼 Approve & Post to LinkedIn

on:
  workflow_dispatch:
    inputs:
      content_id:
        description: 'Content queue ID (from ntfy notification or --list)'
        required: true
        type: string
      action:
        description: 'What to do with this post'
        required: true
        type: choice
        options: [approve, reject]

jobs:
  approve-and-post:
    name: Process LinkedIn approval
    runs-on: ubuntu-latest
    timeout-minutes: 5   # just an API call now — no browser to install/launch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # No more playwright install — we post via LinkedIn's official
      # API now, just an HTTPS request. Much faster, much simpler.
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: |
          mkdir -p data logs config scrapers ai poster
          touch config/__init__.py data/__init__.py scrapers/__init__.py
          touch ai/__init__.py poster/__init__.py logs/scraper.log

      - name: Process approval
        env:
          SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:           ${{ secrets.SUPABASE_KEY }}
          LINKEDIN_CLIENT_ID:     ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
        run: |
          if [ "${{ inputs.action }}" = "approve" ]; then
            python -m poster.linkedin_poster --approve "${{ inputs.content_id }}"
          else
            python -m poster.linkedin_poster --reject "${{ inputs.content_id }}"
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-approval-${{ github.run_number }}
          path: logs/scraper.log
          if-no-files-found: ignore
          retention-days: 7
