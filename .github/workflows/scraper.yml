# ============================================================
#  .github/workflows/scraper.yml
# ============================================================

name: 🤖 Viral Content Scraper

on:
  schedule:
    - cron: '0 */2 * * *'    # every 2 hours

  workflow_dispatch:
    inputs:
      source:
        description: 'Scrape one source only (blank = all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - twitter
          - reddit
          - rss
          - linkedin

jobs:
  scrape:
    name: Run scrapers
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Restore DB ──────────────────────────────────────────
      # We use a NAMED ARTIFACT called 'viral-scraper-db' that gets
      # overwritten every run. This solves the core problem with
      # actions/cache: cache only saves a new entry when the key
      # doesn't already exist, so after the first run the DB is
      # NEVER updated — every subsequent run sees the same empty
      # or stale DB. Named artifacts with overwrite:true always
      # have the latest data and are shared across all workflows.
      - name: Restore database from artifact
        uses: actions/download-artifact@v4
        with:
          name: viral-scraper-db
          path: data/
        continue-on-error: true   # first ever run has no artifact yet — that's OK

      - name: Create required directories
        run: |
          mkdir -p data logs config scrapers ai poster
          touch config/__init__.py data/__init__.py scrapers/__init__.py
          touch ai/__init__.py poster/__init__.py
          touch logs/scraper.log

      - name: Show project structure
        run: |
          echo "=== DB status ==="
          ls -lh data/ 2>/dev/null || echo "data/ is empty (first run)"
          echo ""
          echo "=== Testing imports ==="
          python -c "
          import sys
          sys.path.insert(0, '.')
          from config.settings import KEYWORDS, TWITTER_ACCOUNTS
          from data.database import init_db
          from ai.scorer import score_posts, build_queue
          from ai.rewriter import rewrite_posts
          from poster.notifier import notify_ready_content
          init_db()
          print('✓ All imports OK')
          print(f'✓ {len(KEYWORDS)} keywords, {len(TWITTER_ACCOUNTS)} Twitter accounts')
          "

      - name: Run scraper
        timeout-minutes: 10
        env:
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NTFY_TOPIC:     ${{ secrets.NTFY_TOPIC }}
        run: |
          SOURCE="${{ github.event.inputs.source }}"
          if [ -n "$SOURCE" ]; then
            python run_scraper.py --source "$SOURCE"
          else
            python run_scraper.py
          fi

      - name: Show collection stats
        run: python run_scraper.py --stats

      # ── Save DB ─────────────────────────────────────────────
      # overwrite: true ensures this always replaces the previous
      # artifact — the approval workflow will always get the latest DB.
      - name: Save database to artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: viral-scraper-db
          path: data/posts.db
          overwrite: true           # ← key: replaces previous version
          if-no-files-found: ignore
          retention-days: 90        # keep 90 days of DB history

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-run-${{ github.run_number }}
          path: logs/scraper.log
          if-no-files-found: ignore
          retention-days: 3
