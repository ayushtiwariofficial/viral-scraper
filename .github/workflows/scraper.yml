# ============================================================
#  .github/workflows/scraper.yml  —  FIXED VERSION
# ============================================================

name: 🤖 Viral Content Scraper

on:
  schedule:
    - cron: '0 */2 * * *'    # every 2 hours

  workflow_dispatch:           # manual trigger from GitHub UI
    inputs:
      source:
        description: 'Scrape one source only (blank = all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - twitter
          - reddit
          - rss
          - linkedin

jobs:
  scrape:
    name: Run scrapers
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python setup
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Install deps
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Restore cached DB (persists data between runs)
      - name: Restore database cache
        id: cache-db
        uses: actions/cache@v4
        with:
          path: data/posts.db
          key: posts-db-${{ github.ref_name }}
          restore-keys: posts-db-

      # 5. Create ALL required directories upfront
      - name: Create required directories
        run: |
          mkdir -p data logs config scrapers
          # Ensure __init__.py files exist (in case they're missing from repo)
          touch config/__init__.py
          touch data/__init__.py
          touch scrapers/__init__.py
          # Create empty log file so upload never fails
          touch logs/scraper.log

      # 6. Verify structure before running (helps debug)
      - name: Show project structure
        run: |
          echo "=== Project files ==="
          find . -not -path './.git/*' -name "*.py" | sort
          echo ""
          echo "=== Python version ==="
          python --version
          echo ""
          echo "=== Testing imports ==="
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          from config.settings import KEYWORDS, TWITTER_ACCOUNTS
          from data.database import init_db
          init_db()
          print('✓ All imports OK')
          print(f'✓ {len(KEYWORDS)} keywords loaded')
          print(f'✓ {len(TWITTER_ACCOUNTS)} Twitter accounts configured')
          "

      # 7. Run the scraper
      - name: Run scraper
        env:
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NTFY_TOPIC:     ${{ secrets.NTFY_TOPIC }}
        run: |
          SOURCE="${{ github.event.inputs.source }}"
          if [ -n "$SOURCE" ]; then
            echo "Running single source: $SOURCE"
            python run_scraper.py --source "$SOURCE"
          else
            echo "Running all sources"
            python run_scraper.py
          fi

      # 8. Show stats
      - name: Show collection stats
        run: python run_scraper.py --stats

      # 9. Save DB back to cache
      - name: Save database to cache
        uses: actions/cache@v4
        with:
          path: data/posts.db
          key: posts-db-${{ github.ref_name }}

      # 10. Upload DB snapshot (always, even on failure)
      - name: Upload database snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: posts-db-run-${{ github.run_number }}
          path: data/posts.db
          if-no-files-found: ignore    # ← won't fail if DB not created
          retention-days: 7

      # 11. Upload logs (always, even on failure)
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-run-${{ github.run_number }}
          path: logs/scraper.log
          if-no-files-found: ignore    # ← won't fail if log is empty
          retention-days: 3
