# ============================================================
#  .github/workflows/scraper.yml
#
#  Runs the scraper every 2 hours on GitHub's free servers.
#  Free tier: 2,000 minutes/month on private repos,
#             unlimited on public repos.
#
#  The SQLite database is persisted between runs using
#  GitHub Actions Cache — so you don't lose collected data.
# ============================================================

name: 🤖 Viral Content Scraper

on:
  schedule:
    - cron: '0 */2 * * *'    # every 2 hours, on the hour

  workflow_dispatch:           # lets you trigger manually from GitHub UI
    inputs:
      source:
        description: 'Scrape a single source (leave blank for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - twitter
          - reddit
          - rss
          - linkedin

jobs:
  scrape:
    name: Run scrapers
    runs-on: ubuntu-latest
    timeout-minutes: 15       # kill the job if it hangs

    steps:
      # ── 1. Checkout code ─────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'         # caches pip downloads between runs

      # ── 3. Install dependencies ───────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Restore database from cache ───────────────────────
      #   This is how we persist the SQLite DB between runs.
      #   Cache key includes the date so it rotates monthly.
      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/posts.db
          key: posts-db-${{ github.ref_name }}-${{ hashFiles('data/posts.db') }}
          restore-keys: |
            posts-db-${{ github.ref_name }}-
            posts-db-

      # ── 5. Create required directories ───────────────────────
      - name: Create directories
        run: mkdir -p data logs

      # ── 6. Run the scraper ────────────────────────────────────
      - name: Run scraper
        env:
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NTFY_TOPIC:     ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -n "${{ github.event.inputs.source }}" ]; then
            python run_scraper.py --source ${{ github.event.inputs.source }}
          else
            python run_scraper.py
          fi

      # ── 7. Show stats after run ────────────────────────────────
      - name: Show collection stats
        run: python run_scraper.py --stats

      # ── 8. Save database back to cache ───────────────────────
      - name: Save database to cache
        uses: actions/cache@v4
        with:
          path: data/posts.db
          key: posts-db-${{ github.ref_name }}-${{ hashFiles('data/posts.db') }}

      # ── 9. Upload DB as artifact (downloadable from GitHub UI) ─
      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: posts-database-${{ github.run_number }}
          path: data/posts.db
          retention-days: 7    # keep last 7 days of DB snapshots

      # ── 10. Upload logs ───────────────────────────────────────
      - name: Upload logs
        if: always()           # upload logs even if scraper failed
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_number }}
          path: logs/
          retention-days: 3
