name: 🤖 Viral Content Scraper

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Scrape one source only (blank = all)'
        required: false
        default: ''
        type: choice
        options: ['', 'twitter', 'reddit', 'rss', 'linkedin']

jobs:
  scrape:
    name: Run scrapers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read    # needed to read artifacts via the API

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: |
          mkdir -p data logs config scrapers ai poster
          touch config/__init__.py data/__init__.py scrapers/__init__.py
          touch ai/__init__.py poster/__init__.py logs/scraper.log

      # Download latest DB artifact via the GitHub API.
      # actions/download-artifact@v4 only sees artifacts from the
      # CURRENT run — it can't find artifacts from previous runs.
      # Our Python script uses the REST API to find the latest
      # 'viral-scraper-db' artifact across ALL runs.
      - name: Restore database
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/download_db.py || echo "No previous DB found (first run) — starting fresh"
          ls -lh data/ 2>/dev/null || echo "data/ is empty"

      - name: Verify project structure
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from config.settings import KEYWORDS, TWITTER_ACCOUNTS
          from data.database import init_db
          from ai.scorer import score_posts, build_queue
          from ai.rewriter import rewrite_posts
          from poster.notifier import notify_ready_content
          init_db()
          print('✓ All imports OK')
          "

      - name: Run scraper
        timeout-minutes: 10
        env:
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NTFY_TOPIC:     ${{ secrets.NTFY_TOPIC }}
        run: |
          SOURCE="${{ github.event.inputs.source }}"
          if [ -n "$SOURCE" ]; then
            python run_scraper.py --source "$SOURCE"
          else
            python run_scraper.py
          fi

      - name: Show collection stats
        run: python run_scraper.py --stats

      # Upload updated DB — overwrite:true replaces the previous version
      # so the approval workflow always gets the latest data
      - name: Save database artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: viral-scraper-db
          path: data/posts.db
          overwrite: true
          if-no-files-found: ignore
          retention-days: 90

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-run-${{ github.run_number }}
          path: logs/scraper.log
          if-no-files-found: ignore
          retention-days: 3
