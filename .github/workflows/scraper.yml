name: 🤖 Viral Content Scraper

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Scrape one source only (blank = all)'
        required: false
        default: ''
        type: choice
        options: ['', 'twitter', 'reddit', 'rss', 'linkedin']

jobs:
  scrape:
    name: Run scrapers
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: |
          mkdir -p data logs config scrapers ai poster
          touch config/__init__.py data/__init__.py scrapers/__init__.py
          touch ai/__init__.py poster/__init__.py logs/scraper.log

      # No more DB restore step needed — Supabase is always-on.
      - name: Verify Supabase connection
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from config.settings import KEYWORDS, TWITTER_ACCOUNTS
          from data.database import init_db
          from ai.scorer import score_posts, build_queue
          from ai.rewriter import rewrite_posts
          from poster.notifier import notify_ready_content
          init_db()
          print('✓ All imports OK, Supabase connected')
          print(f'✓ {len(KEYWORDS)} keywords, {len(TWITTER_ACCOUNTS)} Twitter accounts')
          "

      - name: Run scraper
        timeout-minutes: 10
        env:
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NTFY_TOPIC:     ${{ secrets.NTFY_TOPIC }}
          SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:   ${{ secrets.SUPABASE_KEY }}
        run: |
          SOURCE="${{ github.event.inputs.source }}"
          if [ -n "$SOURCE" ]; then
            python run_scraper.py --source "$SOURCE"
          else
            python run_scraper.py
          fi

      - name: Show collection stats
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python run_scraper.py --stats

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-run-${{ github.run_number }}
          path: logs/scraper.log
          if-no-files-found: ignore
          retention-days: 3
